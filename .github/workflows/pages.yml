name: Deploy Exegesis Portal

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          # Add any other dependencies if needed later

      - name: Build portal
        run: |
          # Only run the full pipeline if the source file exists (it won't in a typical public repo)
          if [ -f "data/raw/exegesis_ordered.txt" ]; then
            python scripts/build_portal.py
          else
            echo "Source data missing, proceeding with prebuilt docs/"
            # Ensure docs exists and has content
            [ -d "docs" ] || mkdir docs
          fi

      - name: Disable Jekyll
        run: touch docs/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
